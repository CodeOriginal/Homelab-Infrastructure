---
name: hl-infra-unifi

services:
  unifi-network-application:
    image: lscr.io/linuxserver/unifi-network-application:latest
    container_name: unifi-network-application
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Denver
      - MONGO_USER=unifi
      - MONGO_PASS=${UNIFI_MONGO_PASSWORD}
      - MONGO_HOST=unifi-db
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
      - MEM_LIMIT=1024 #optional
      - MEM_STARTUP=1024 #optional
      - MONGO_TLS= #optional
    volumes:
      - /srv/infra/unifi/data:/config
    ports:
      - 8443:8443
      - 3478:3478/udp
      - 10001:10001/udp
      - 8080:8080
      - 1900:1900/udp #optional
      - 8843:8843 #optional
      - 8880:8880 #optional
      - 6789:6789 #optional
      - 5514:5514/udp #optional
    networks:
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.unifi.entrypoints: websecure
      traefik.http.routers.unifi.rule: Host(`unifi.burgoyne.casa`)
      traefik.http.routers.unifi.tls: true
      traefik.http.routers.unifi.tls.certresolver: letsencrypt
    restart: unless-stopped

networks:
  proxy:
    external: true